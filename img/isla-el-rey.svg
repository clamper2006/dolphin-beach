<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Isla El Rey">
  <!-- Background ocean gradient -->
  <defs>
    <linearGradient id="oceanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0077B6"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
    <linearGradient id="sandGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFD77A"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#B2EBF2"/>
    </linearGradient>
    <linearGradient id="leafGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#43A047"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <linearGradient id="leafGrad2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="512" height="512" fill="url(#skyGrad)" rx="80"/>

  <!-- Deep ocean -->
  <ellipse cx="256" cy="460" rx="240" ry="90" fill="url(#oceanGrad)" opacity=".9"/>

  <!-- Mid ocean layer -->
  <ellipse cx="256" cy="440" rx="210" ry="68" fill="#0096C7" opacity=".7"/>

  <!-- Sandy island -->
  <ellipse cx="256" cy="390" rx="140" ry="52" fill="url(#sandGrad)" filter="url(#shadow)"/>

  <!-- Island texture highlights -->
  <ellipse cx="230" cy="378" rx="55" ry="18" fill="#FFECB3" opacity=".45"/>
  <ellipse cx="290" cy="395" rx="35" ry="12" fill="#FFD54F" opacity=".35"/>

  <!-- Palm trunk — slight lean right -->
  <path d="M250 388 Q244 360 248 310 Q252 270 258 230 Q262 200 265 170"
        stroke="#6D4C41" stroke-width="18" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Trunk highlight -->
  <path d="M252 385 Q248 355 251 305 Q255 265 260 225 Q263 198 266 172"
        stroke="#8D6E63" stroke-width="6" fill="none"
        stroke-linecap="round" opacity=".5"/>

  <!-- Palm leaves — fan arrangement -->
  <!-- Leaf 1: far left drooping -->
  <path d="M263 178 Q210 148 170 120 Q148 106 142 90"
        stroke="url(#leafGrad1)" stroke-width="14" fill="none"
        stroke-linecap="round"/>
  <!-- Leaf 2: left upward -->
  <path d="M263 178 Q228 138 212 96 Q202 68 208 44"
        stroke="url(#leafGrad2)" stroke-width="14" fill="none"
        stroke-linecap="round"/>
  <!-- Leaf 3: center-left upward -->
  <path d="M264 175 Q252 128 258 86 Q262 58 270 36"
        stroke="url(#leafGrad1)" stroke-width="14" fill="none"
        stroke-linecap="round"/>
  <!-- Leaf 4: center-right upward -->
  <path d="M266 176 Q282 130 298 90 Q308 64 312 44"
        stroke="url(#leafGrad2)" stroke-width="14" fill="none"
        stroke-linecap="round"/>
  <!-- Leaf 5: right upward -->
  <path d="M267 180 Q306 146 340 114 Q360 96 372 82"
        stroke="url(#leafGrad1)" stroke-width="14" fill="none"
        stroke-linecap="round"/>
  <!-- Leaf 6: far right drooping -->
  <path d="M267 185 Q318 168 360 156 Q388 148 402 140"
        stroke="url(#leafGrad2)" stroke-width="12" fill="none"
        stroke-linecap="round"/>

  <!-- Leaf tips (lighter) -->
  <path d="M172 91 Q160 82 148 72" stroke="#A5D6A7" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M210 46 Q206 34 208 22" stroke="#A5D6A7" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M312 44 Q316 32 316 20" stroke="#A5D6A7" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M372 83 Q384 70 392 58" stroke="#A5D6A7" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M402 141 Q418 136 430 128" stroke="#A5D6A7" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Coconuts cluster -->
  <circle cx="256" cy="190" r="14" fill="#4E342E"/>
  <circle cx="272" cy="196" r="12" fill="#5D4037"/>
  <circle cx="244" cy="197" r="11" fill="#4E342E"/>
  <!-- Coconut highlights -->
  <circle cx="252" cy="186" r="4"  fill="#795548" opacity=".5"/>
  <circle cx="268" cy="192" r="3"  fill="#795548" opacity=".4"/>

  <!-- Churuata hut on island -->
  <!-- Hut base -->
  <rect x="210" y="348" width="90" height="38" rx="4" fill="#EFEBE9"/>
  <!-- Hut roof -->
  <polygon points="200,350 310,350 256,316" fill="#8D6E63"/>
  <polygon points="204,350 308,350 256,319" fill="#A1887F"/>
  <!-- Hut door -->
  <rect x="246" y="360" width="22" height="26" rx="3" fill="#6D4C41"/>
  <!-- Hut window -->
  <rect x="214" y="358" width="18" height="14" rx="2" fill="#B3E5FC"/>
  <rect x="286" y="358" width="18" height="14" rx="2" fill="#B3E5FC"/>

  <!-- Ocean waves -->
  <path d="M40 440 Q80 428 120 440 Q160 452 200 440 Q240 428 280 440 Q320 452 360 440 Q400 428 440 440 Q470 448 480 440"
        stroke="#E0F7FA" stroke-width="4" fill="none" opacity=".8" stroke-linecap="round"/>
  <path d="M30 460 Q75 448 120 460 Q165 472 210 460 Q255 448 300 460 Q345 472 390 460 Q430 448 470 458"
        stroke="#ffffff" stroke-width="3" fill="none" opacity=".55" stroke-linecap="round"/>

  <!-- Sun / sky accent -->
  <circle cx="420" cy="70" r="36" fill="#FFF9C4" opacity=".8"/>
  <circle cx="420" cy="70" r="28" fill="#FFF176" opacity=".9"/>
  <!-- Sun rays -->
  <g stroke="#FFF176" stroke-width="3" opacity=".6" stroke-linecap="round">
    <line x1="420" y1="24" x2="420" y2="16"/>
    <line x1="420" y1="116" x2="420" y2="124"/>
    <line x1="374" y1="70" x2="366" y2="70"/>
    <line x1="466" y1="70" x2="474" y2="70"/>
    <line x1="387" y1="37" x2="381" y2="31"/>
    <line x1="453" y1="103" x2="459" y2="109"/>
    <line x1="453" y1="37" x2="459" y2="31"/>
    <line x1="387" y1="103" x2="381" y2="109"/>
  </g>

  <!-- Seagulls -->
  <path d="M120 140 Q128 133 136 140" stroke="#78909C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M148 120 Q157 112 167 120" stroke="#78909C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M390 115 Q398 108 406 115" stroke="#90A4AE" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
